version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: logistics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logistics_user
      POSTGRES_PASSWORD: logistics_pass_2024
      POSTGRES_DB: logistics_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics_user -d logistics_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logistics_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_pass_2024 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://logistics_user:logistics_pass_2024@postgres:5432/logistics_erp
      REDIS_URL: redis://:redis_pass_2024@redis:6379
      JWT_SECRET: super_secret_jwt_key_logistics_2024_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logistics_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_APP_NAME: "LogisticsPro ERP"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  default:
    name: logistics_network
