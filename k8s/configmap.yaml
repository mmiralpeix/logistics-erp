apiVersion: v1
kind: ConfigMap
metadata:
  name: logistics-config
  namespace: logistics-erp
data:
  NODE_ENV: "production"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "logistics_erp"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  BACKEND_PORT: "3001"
  FRONTEND_PORT: "3000"
  CORS_ORIGIN: "http://frontend-service:3000"
  API_URL: "http://backend-service:3001"
  NEXT_PUBLIC_API_URL: "http://backend-service:3001"
  RATE_LIMIT_MAX: "100"
  RATE_LIMIT_TTL: "60"
  UPLOAD_DIR: "/app/uploads"
  TZ: "America/Argentina/Buenos_Aires"
